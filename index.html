<!DOCTYPE html>
<html>
<head>
  <title>School Report System</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    h2 { text-align: center; }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, select {
      padding: 5px;
      margin: 5px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>📚 SCHOOL REPORT SYSTEM</h2>

<div class="container">

  Student Name: <input type="text" id="name"><br>
  Class: <input type="text" id="class"><br>
  Term: <input type="text" id="term"><br>

  <hr>

  <!-- SUBJECT SELECTOR -->
  Subject:
  <select id="subject">
    <option value="Kinyarwanda">Kinyarwanda</option>
    <option value="English">English</option>
    <option value="Mathematics">Mathematics</option>
    <option value="Science & Tech">Science & Tech</option>
    <option value="Social Studies">Social Studies (SST)</option>
    <option value="Religious Education">Religious Education</option>
  </select>

  Quiz (/20): <input type="number" id="quiz">
  Test (/40): <input type="number" id="test">
  Exam (/40): <input type="number" id="exam">

  <button onclick="addSubject()">Add Subject</button>

  <table>
    <tr>
      <th>Subject</th>
      <th>Quiz</th>
      <th>Test</th>
      <th>Exam</th>
      <th>Total</th>
      <th>Grade</th>
      <th>Remark</th>
    </tr>
    <tbody id="tbody"></tbody>
  </table>

  <button onclick="generateReport()">Generate Report</button>
  <button onclick="downloadReport()">Download</button>

</div>

<div id="report"></div>

<script>

let data = [];

function getGrade(m){
  if(m >= 80) return "A";
  if(m >= 70) return "B";
  if(m >= 60) return "C";
  if(m >= 50) return "D";
  return "E";
}

function getRemark(g){
  if(g=="A") return "Excellent";
  if(g=="B") return "Very Good";
  if(g=="C") return "Good";
  if(g=="D") return "Fair";
  return "Weak";
}

// ADD SUBJECT
function addSubject(){
  let subject = document.getElementById("subject").value;
  let q = Number(document.getElementById("quiz").value || 0);
  let t = Number(document.getElementById("test").value || 0);
  let e = Number(document.getElementById("exam").value || 0);

  let total = q + t + e;
  let grade = getGrade(total);
  let remark = getRemark(grade);

  data.push({subject, q, t, e, total, grade, remark});

  renderTable();
}

// SHOW TABLE
function renderTable(){
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(d=>{
    tbody.innerHTML += `
      <tr>
        <td>${d.subject}</td>
        <td>${d.q}</td>
        <td>${d.t}</td>
        <td>${d.e}</td>
        <td>${d.total}</td>
        <td>${d.grade}</td>
        <td>${d.remark}</td>
      </tr>
    `;
  });
}

// REPORT
function generateReport(){
  let name = document.getElementById("name").value;
  let cls = document.getElementById("class").value;
  let term = document.getElementById("term").value;

  let totalMarks = data.reduce((sum, d) => sum + d.total, 0);
  let avg = (data.length ? (totalMarks / data.length).toFixed(2) : 0);

  let html = `
    <h3>📄 STUDENT REPORT</h3>
    <p><b>Name:</b> ${name}</p>
    <p><b>Class:</b> ${cls}</p>
    <p><b>Term:</b> ${term}</p>

    <p><b>Total:</b> ${totalMarks}</p>
    <p><b>Average:</b> ${avg}%</p>

    <table border="1" width="100%">
      <tr>
        <th>Subject</th>
        <th>Total</th>
        <th>Grade</th>
        <th>Remark</th>
      </tr>
  `;

  data.forEach(d=>{
    html += `
      <tr>
        <td>${d.subject}</td>
        <td>${d.total}</td>
        <td>${d.grade}</td>
        <td>${d.remark}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("report").innerHTML = html;
}

// DOWNLOAD
function downloadReport(){
  let content = document.getElementById("report").innerHTML;
  let blob = new Blob([content], {type: "application/msword"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "report.doc";
  a.click();
}

</script>

</body>
</html>
