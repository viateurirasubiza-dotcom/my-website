<!DOCTYPE html>
<html>
<head>
  <title>REB School System</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, select {
      padding: 6px;
      margin: 5px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<h2>🇷🇼 REB SCHOOL REPORT SYSTEM</h2>

<div class="box">

  <!-- STUDENT INFO -->
  Student Name:
  <input type="text" id="name"><br>

  Class:
  <input type="text" id="class"><br>

  Term:
  <input type="text" id="term"><br>

  Teacher:
  <input type="text" id="teacher" value="Anita"><br>

  <hr>

  <!-- SUBJECT -->
  Subject:
  <select id="subject">
    <option>Kinyarwanda</option>
    <option>English</option>
    <option>Mathematics</option>
    <option>Science & Tech</option>
    <option>Social Studies</option>
    <option>Religious Education</option>
  </select>

  Quiz (/20):
  <input type="number" id="quiz">

  Test (/40):
  <input type="number" id="test">

  Exam (/40):
  <input type="number" id="exam">

  <br>

  <button onclick="addSubject()">Add Subject</button>
  <button onclick="saveStudent()">Save Student</button>
  <button onclick="downloadPDF()">Download PDF</button>

</div>

<h3>📚 Students List</h3>
<div id="studentsList"></div>

<table>
  <thead>
    <tr>
      <th>Subject</th>
      <th>Total</th>
      <th>Grade</th>
      <th>Remark</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>

let currentData = [];
let database = JSON.parse(localStorage.getItem("students")) || [];

function grade(m){
  if(m >= 80) return "A";
  if(m >= 70) return "B";
  if(m >= 60) return "C";
  if(m >= 50) return "D";
  return "E";
}

function remark(g){
  return {
    "A":"Excellent",
    "B":"Very Good",
    "C":"Good",
    "D":"Fair",
    "E":"Weak"
  }[g];
}

function addSubject(){

  let subject = document.getElementById("subject").value;
  let q = Number(document.getElementById("quiz").value || 0);
  let t = Number(document.getElementById("test").value || 0);
  let e = Number(document.getElementById("exam").value || 0);

  let total = q + t + e;
  let g = grade(total);
  let r = remark(g);

  currentData.push({subject, total, g, r});
  render();
}

function render(){
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  currentData.forEach(d=>{
    tbody.innerHTML += `
      <tr>
        <td>${d.subject}</td>
        <td>${d.total}</td>
        <td>${d.g}</td>
        <td>${d.r}</td>
      </tr>
    `;
  });
}

function saveStudent(){

  let student = {
    name: document.getElementById("name").value,
    cls: document.getElementById("class").value,
    term: document.getElementById("term").value,
    teacher: document.getElementById("teacher").value,
    data: currentData
  };

  database.push(student);
  localStorage.setItem("students", JSON.stringify(database));

  alert("Student saved!");

  currentData = [];
  render();
  renderStudents();
}

function renderStudents(){

  let div = document.getElementById("studentsList");
  div.innerHTML = "";

  database.forEach((s,i)=>{
    div.innerHTML += `
      <button onclick="loadStudent(${i})">
        ${s.name} - ${s.cls}
      </button>
    `;
  });
}

function loadStudent(i){
  let s = database[i];

  document.getElementById("name").value = s.name;
  document.getElementById("class").value = s.cls;
  document.getElementById("term").value = s.term;
  document.getElementById("teacher").value = s.teacher;

  currentData = s.data;
  render();
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let name = document.getElementById("name").value;
  let cls = document.getElementById("class").value;
  let term = document.getElementById("term").value;
  let teacher = document.getElementById("teacher").value;

  // 🏫 HEADER (REB STYLE)
  doc.setFontSize(14);
  doc.text("REPUBLIC OF RWANDA", 60, 10);
  doc.text("MINISTRY OF EDUCATION", 65, 18);
  doc.text("PRIMARY SCHOOL REPORT CARD", 50, 28);

  // 👨‍🎓 INFO
  doc.setFontSize(11);
  doc.text("Name: " + name, 10, 40);
  doc.text("Class: " + cls, 10, 48);
  doc.text("Term: " + term, 10, 56);
  doc.text("Teacher: " + teacher, 10, 64);

  // 📊 TABLE
  let y = 80;

  doc.text("Subject", 10, y);
  doc.text("Total", 70, y);
  doc.text("Grade", 110, y);
  doc.text("Remark", 140, y);

  y += 10;

  currentData.forEach(d=>{
    doc.text(d.subject, 10, y);
    doc.text(String(d.total), 70, y);
    doc.text(d.g, 110, y);
    doc.text(d.r, 140, y);
    y += 10;
  });

  y += 10;

  // ✍ SIGNATURES
  doc.text("Teacher Signature: ________________", 10, y);
  y += 10;
  doc.text("Head Teacher Signature: ____________", 10, y);

  // 🔴 STAMP
  doc.circle(170, y - 15, 15);
  doc.setFontSize(8);
  doc.text("OFFICIAL STAMP", 160, y - 12);

  doc.save(name + "_REB_Report.pdf");
}

// INIT
renderStudents();

</script>

</body>
</html>
