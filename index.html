<!DOCTYPE html>
<html>
<head>
    <title>My Upgraded Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background-color: #1e1e2f;
            color: white;
        }

        .menu {
            background-color: #111;
            padding: 15px;
        }

        .menu a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .menu a:hover {
            color: #00ffcc;
        }

        .section {
            padding: 40px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            margin: 5px;
            background-color: #00ffcc;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00cc99;
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <div class="menu">
        <a href="#home">Home</a>
        <a href="#calculator">Calculator</a>
        <a href="#game">Game</a>
    </div>

    <!-- HOME -->
    <div class="section" id="home">
        <h1>Muraho 👋</h1>
        <p>Website yanjye yavuguruwe 🔥</p>
    </div>

    <!-- CALCULATOR -->
    <div class="section" id="calculator">
        <h1>Calculator 🧮</h1>

        <input type="number" id="num1" placeholder="Number 1">
        <input type="number" id="num2" placeholder="Number 2">
        <br>

        <button onclick="add()">+</button>
        <button onclick="subtract()">-</button>
        <button onclick="multiply()">*</button>
        <button onclick="divide()">/</button>

        <p id="result">Result: </p>
    </div>

    <!-- GAME -->
    <div class="section" id="game">
        <h1>Guess Game 🎮</h1>

        <p>Hitamo number hagati ya 1 na 10</p>

        <input type="number" id="guess">
        <button onclick="check()">Check</button>

        <p id="message"></p>
        <p id="chances">Chances left: 3</p>
    </div>

    <script>
        // CALCULATOR
        function add() {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);
            document.getElementById("result").innerHTML = "Result: " + (a + b);
        }

        function subtract() {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);
            document.getElementById("result").innerHTML = "Result: " + (a - b);
        }

        function multiply() {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);
            document.getElementById("result").innerHTML = "Result: " + (a * b);
        }

        function divide() {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);

            if (b == 0) {
                document.getElementById("result").innerHTML = "Ntibishoboka kugabanya na 0!";
            } else {
                document.getElementById("result").innerHTML = "Result: " + (a / b);
            }
        }

        // GAME
        let secret = Math.floor(Math.random() * 10) + 1;
        let chances = 3;

        function check() {
            let user = document.getElementById("guess").value;

            if (chances > 0) {
                if (user == secret) {
                    document.getElementById("message").innerHTML = "Watsinze! 🎉";
                    chances = 0;
                } else {
                    chances--;
                    document.getElementById("message").innerHTML = "Ongera ugerageze 😅";
                }

                document.getElementById("chances").innerHTML =
                    "Chances left: " + chances;
            }

            if (chances == 0 && user != secret) {
                document.getElementById("message").innerHTML =
                    "Game irangiye 😢 Number yari: " + secret;
            }
        }
    </script>

</body>
</html>
